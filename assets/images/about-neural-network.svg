<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 280" width="220" height="280" role="img" aria-labelledby="nn-title">
  <title id="nn-title">Stylized neural network diagram</title>
  <defs>
    <linearGradient id="nn-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1222"/>
      <stop offset="45%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a0e14"/>
    </linearGradient>
    <linearGradient id="nn-node" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="nn-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="220" height="280" rx="10" fill="url(#nn-bg)"/>
  <rect width="220" height="280" rx="10" fill="none" stroke="rgba(148,163,184,0.25)" stroke-width="1"/>

  <!-- connections: input (4) -> hidden (5) -> output (2) -->
  <g stroke="rgba(125,211,252,0.28)" stroke-width="1" fill="none">
    <!-- input to hidden -->
    <path d="M44 68 L36 128 M44 68 L72 128 M44 68 L108 128 M44 68 L144 128 M44 68 L180 128"/>
    <path d="M76 68 L36 128 M76 68 L72 128 M76 68 L108 128 M76 68 L144 128 M76 68 L180 128"/>
    <path d="M108 68 L36 128 M108 68 L72 128 M108 68 L108 128 M108 68 L144 128 M108 68 L180 128"/>
    <path d="M140 68 L36 128 M140 68 L72 128 M140 68 L108 128 M140 68 L144 128 M140 68 L180 128"/>
    <!-- hidden to output -->
    <path d="M36 152 L88 212 M36 152 L132 212 M72 152 L88 212 M72 152 L132 212 M108 152 L88 212 M108 152 L132 212 M144 152 L88 212 M144 152 L132 212 M180 152 L88 212 M180 152 L132 212"/>
  </g>

  <!-- input layer -->
  <g filter="url(#nn-glow)">
    <circle cx="44" cy="62" r="9" fill="url(#nn-node)" stroke="#5eead4" stroke-width="1.2"/>
    <circle cx="76" cy="62" r="9" fill="url(#nn-node)" stroke="#7dd3fc" stroke-width="1.2"/>
    <circle cx="108" cy="62" r="9" fill="url(#nn-node)" stroke="#5eead4" stroke-width="1.2"/>
    <circle cx="140" cy="62" r="9" fill="url(#nn-node)" stroke="#7dd3fc" stroke-width="1.2"/>
  </g>

  <!-- hidden layer -->
  <g filter="url(#nn-glow)">
    <circle cx="36" cy="140" r="8" fill="url(#nn-node)" stroke="#67e8f9" stroke-width="1"/>
    <circle cx="72" cy="140" r="8" fill="url(#nn-node)" stroke="#5eead4" stroke-width="1"/>
    <circle cx="108" cy="140" r="10" fill="#134e4a" stroke="#5eead4" stroke-width="1.4"/>
    <circle cx="144" cy="140" r="8" fill="url(#nn-node)" stroke="#7dd3fc" stroke-width="1"/>
    <circle cx="180" cy="140" r="8" fill="url(#nn-node)" stroke="#67e8f9" stroke-width="1"/>
  </g>

  <!-- output layer -->
  <g filter="url(#nn-glow)">
    <circle cx="88" cy="218" r="10" fill="#1e1b4b" stroke="#a5b4fc" stroke-width="1.3"/>
    <circle cx="132" cy="218" r="10" fill="#134e4a" stroke="#5eead4" stroke-width="1.3"/>
  </g>

  <text x="110" y="258" text-anchor="middle" fill="rgba(226,232,240,0.55)" font-family="system-ui,Segoe UI,sans-serif" font-size="10" letter-spacing="0.12em">LAYERED NET</text>
</svg>
